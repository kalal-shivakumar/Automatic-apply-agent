<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naukri AI Job Agent</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <!-- React loaded from local node_modules (no CDN, no Vite, no esbuild needed) -->
  <script src="/static/react.js"></script>
  <script src="/static/react-dom.js"></script>
  <!-- Babel standalone for in-browser JSX transform -->
  <script src="/static/babel.js"></script>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1419;--bg-panel:#1a1f2e;--bg-card:#242938;--bg-hover:#2d3548;--border:#2d3548;--text:#e6edf3;--text-dim:#8b949e;--green:#3fb950;--green-bg:rgba(63,185,80,.12);--red:#f85149;--red-bg:rgba(248,81,73,.12);--blue:#4493f8;--blue-bg:rgba(68,147,248,.12);--yellow:#d29922;--yellow-bg:rgba(210,153,34,.12);--purple:#bc8cff;--radius:8px;--radius-sm:6px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:20px 24px}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px}
.header h1{font-size:1.5rem;font-weight:700;letter-spacing:-.5px}
.subtitle{display:block;color:var(--text-dim);font-size:.85rem;font-weight:400;margin-top:2px}
.conn-badge{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:.8rem;font-weight:500}
.conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.conn-on{background:var(--green-bg);color:var(--green)}.conn-on .conn-dot{background:var(--green);box-shadow:0 0 6px var(--green)}
.conn-off{background:var(--red-bg);color:var(--red)}.conn-off .conn-dot{background:var(--red)}
.controls{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.ctrl-btn{display:flex;align-items:center;gap:12px;padding:12px 20px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-panel);color:var(--text);cursor:pointer;transition:all .2s;flex:1;min-width:180px}
.ctrl-btn:hover:not(:disabled){border-color:var(--blue);background:var(--bg-card)}
.ctrl-btn:disabled{opacity:.4;cursor:not-allowed}
.ctrl-step{width:32px;height:32px;border-radius:50%;background:var(--bg-card);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.ctrl-content{display:flex;flex-direction:column;text-align:left}
.ctrl-title{font-weight:600;font-size:.9rem}
.ctrl-desc{font-size:.75rem;color:var(--text-dim)}
.ctrl-primary .ctrl-step{background:var(--blue-bg);color:var(--blue)}
.ctrl-done{border-color:var(--green)!important}.ctrl-done .ctrl-step{background:var(--green-bg);color:var(--green)}
.ctrl-danger{border-color:var(--red)!important}.ctrl-danger .ctrl-step{background:var(--red-bg);color:var(--red)}
.ctrl-arrow{color:var(--text-dim);font-size:1.2rem;flex-shrink:0}
.stats-row{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.stat-card{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 24px;text-align:center;min-width:120px;flex:1}
.stat-value{font-size:2rem;font-weight:700;line-height:1;margin-bottom:4px}
.stat-value-sm{font-size:1.4rem;line-height:1;margin-bottom:4px}
.stat-label{font-size:.8rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.stat-green .stat-value{color:var(--green)}.stat-red .stat-value{color:var(--red)}.stat-orange .stat-value{color:var(--yellow)}
.stat-blue{border-color:var(--blue)}.stat-wide{flex:3}
.section{margin-bottom:24px}
.section h2{font-size:1.1rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.count{color:var(--text-dim);font-weight:400;font-size:.85rem}
.table-wrap{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;max-height:400px;overflow-y:scroll}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead{position:sticky;top:0;z-index:1}
th{background:var(--bg-card);padding:10px 12px;text-align:left;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
tbody tr:hover{background:var(--bg-hover)}
tbody tr:last-child td{border-bottom:none}
.col-num{color:var(--text-dim);font-size:.8rem;width:40px}
.col-company{font-weight:600;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-title{max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.job-link{color:var(--blue);text-decoration:none}.job-link:hover{text-decoration:underline;color:#79b8ff}
.col-reason{font-size:.78rem;color:var(--text-dim);max-width:350px;line-height:1.4}
.row-applied{background:var(--green-bg)!important}.row-evaluating{background:var(--yellow-bg)!important}.row-error{background:var(--red-bg)!important}
.score-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-weight:700;font-size:.8rem;text-align:center;min-width:48px}
.score-good{background:var(--green-bg);color:var(--green)}.score-medium{background:var(--yellow-bg);color:var(--yellow)}.score-low{background:var(--red-bg);color:var(--red)}
.status-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600;white-space:nowrap}
.badge-applied{background:var(--green-bg);color:var(--green)}.badge-evaluating{background:var(--yellow-bg);color:var(--yellow)}.badge-error{background:var(--red-bg);color:var(--red)}.badge-skipped{background:var(--bg-card);color:var(--text-dim)}
.log-box{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);padding:12px;height:300px;overflow-y:auto;font-family:'Courier New',monospace;font-size:.8rem}
.log-line{display:flex;gap:8px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.log-time{color:var(--text-dim);flex-shrink:0}
.log-msg{color:var(--text);word-break:break-word}
.empty{padding:40px;text-align:center;color:var(--text-dim)}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef } = React;
const WS_URL = 'ws://localhost:8000/ws';

function App() {
  const [connected, setConnected] = useState(false);
  const [browserLaunched, setBrowserLaunched] = useState(false);
  const [loggedIn, setLoggedIn] = useState(false);
  const [isRunning, setIsRunning] = useState(false);
  const [jobs, setJobs] = useState([]);
  const [logs, setLogs] = useState([]);
  const [stats, setStats] = useState({ applied: 0, skipped: 0, already_applied: 0, evaluated: 0, current_query: '' });
  const wsRef = useRef(null);
  const logBoxRef = useRef(null);
  const reconnectRef = useRef(null);

  const addLog = (message) => {
    const time = new Date().toLocaleTimeString('en-US', { hour12: false });
    setLogs((prev) => [...prev.slice(-300), { time, message }]);
  };

  const connectWS = () => {
    if (wsRef.current && wsRef.current.readyState === WebSocket.OPEN) return;
    const ws = new WebSocket(WS_URL);
    wsRef.current = ws;
    ws.onopen = () => { setConnected(true); addLog('Connected to server'); };
    ws.onclose = () => { setConnected(false); wsRef.current = null; reconnectRef.current = setTimeout(connectWS, 3000); };
    ws.onerror = () => {};
    ws.onmessage = (e) => { const data = JSON.parse(e.data); handleMessage(data); };
  };

  const handleMessage = (data) => {
    switch (data.type) {
      case 'init':
        setBrowserLaunched(data.browser_launched);
        setLoggedIn(data.logged_in);
        setIsRunning(data.is_running);
        if (data.jobs && data.jobs.length) setJobs(data.jobs);
        if (data.stats) setStats(data.stats);
        break;
      case 'browser_status':
        setBrowserLaunched(data.launched);
        addLog(data.message);
        break;
      case 'login_status':
        setLoggedIn(data.logged_in);
        addLog(data.message);
        break;
      case 'agent_started':
        setIsRunning(true);
        setJobs([]);
        setStats({ applied: 0, skipped: 0, already_applied: 0, evaluated: 0, current_query: '' });
        addLog(data.message);
        break;
      case 'search_query':
        setStats((s) => ({ ...s, current_query: `${data.keywords} in ${data.location} [${data.query_number}/${data.total_queries}]` }));
        addLog(`Search [${data.query_number}/${data.total_queries}]: "${data.keywords}" in ${data.location}`);
        break;
      case 'log':
        addLog(data.message);
        break;
      case 'job_update':
        setJobs((prev) => {
          const idx = prev.findIndex((j) => j.id === data.job.id);
          if (idx >= 0) { const u = [...prev]; u[idx] = data.job; return u; }
          return [...prev, data.job];
        });
        if (data.stats) setStats(data.stats);
        if (data.job.status === 'Evaluating...') {
          addLog(`Evaluating: ${data.job.title} @ ${data.job.company}`);
        } else {
          const icon = data.job.status.includes('Applied') ? '[OK]' : data.job.status.includes('Error') ? '[ERR]' : '[SKIP]';
          addLog(`${icon} ${data.job.status} - ${data.job.title} @ ${data.job.company} | Score: ${data.job.match_score != null ? data.job.match_score : '?'}% | ${data.job.match_reason}`);
        }
        break;
      case 'agent_completed':
      case 'agent_stopped':
        setIsRunning(false);
        if (data.stats) setStats(data.stats);
        addLog(`Done: ${data.message || 'Agent finished'}`);
        break;
      case 'error':
        addLog(`ERROR: ${data.message}`);
        break;
      default: break;
    }
  };

  useEffect(() => {
    connectWS();
    return () => { clearTimeout(reconnectRef.current); if (wsRef.current) wsRef.current.close(); };
  }, []);

  useEffect(() => {
    if (logBoxRef.current) logBoxRef.current.scrollTop = logBoxRef.current.scrollHeight;
  }, [logs]);

  const send = (action) => {
    if (wsRef.current && wsRef.current.readyState === WebSocket.OPEN)
      wsRef.current.send(JSON.stringify({ action }));
  };

  const getScoreClass = (score) => { if (score == null) return ''; if (score >= 60) return 'score-good'; if (score >= 40) return 'score-medium'; return 'score-low'; };
  const getRowClass = (status) => { if (!status) return ''; if (status.includes('Applied')) return 'row-applied'; if (status.includes('Evaluating')) return 'row-evaluating'; if (status.includes('Error')) return 'row-error'; return 'row-skipped'; };
  const getStatusClass = (status) => { if (!status) return ''; if (status.includes('Applied')) return 'badge-applied'; if (status.includes('Evaluating')) return 'badge-evaluating'; if (status.includes('Error')) return 'badge-error'; return 'badge-skipped'; };

  return (
    <div className="app">
      <header className="header">
        <div className="header-left">
          <h1>Naukri.com AI Job Agent</h1>
          <span className="subtitle">Automated Job Search and Application</span>
        </div>
        <div className={`conn-badge ${connected ? 'conn-on' : 'conn-off'}`}>
          <span className="conn-dot" />
          {connected ? 'Connected' : 'Disconnected'}
        </div>
      </header>

      <div className="controls">
        <button className={`ctrl-btn ${browserLaunched ? 'ctrl-done' : 'ctrl-primary'}`} onClick={() => send('launch_browser')} disabled={browserLaunched || isRunning}>
          <span className="ctrl-step">1</span>
          <div className="ctrl-content">
            <span className="ctrl-title">{browserLaunched ? 'Browser Launched' : 'Launch Browser'}</span>
            <span className="ctrl-desc">Opens Chromium for Naukri login</span>
          </div>
        </button>
        <span className="ctrl-arrow">-&gt;</span>
        <button className={`ctrl-btn ${loggedIn ? 'ctrl-done' : 'ctrl-primary'}`} onClick={() => send('verify_login')} disabled={!browserLaunched || loggedIn || isRunning}>
          <span className="ctrl-step">2</span>
          <div className="ctrl-content">
            <span className="ctrl-title">{loggedIn ? 'Logged In' : 'Verify Login'}</span>
            <span className="ctrl-desc">Confirm Naukri.com login</span>
          </div>
        </button>
        <span className="ctrl-arrow">-&gt;</span>
        <button className={`ctrl-btn ${isRunning ? 'ctrl-danger' : 'ctrl-primary'}`} onClick={() => send(isRunning ? 'stop' : 'start')} disabled={!loggedIn}>
          <span className="ctrl-step">{isRunning ? '■' : '3'}</span>
          <div className="ctrl-content">
            <span className="ctrl-title">{isRunning ? 'Stop Agent' : 'Start Agent'}</span>
            <span className="ctrl-desc">{isRunning ? 'Stop job applications' : 'Begin applying to jobs'}</span>
          </div>
        </button>
      </div>

      <div className="stats-row">
        <div className="stat-card stat-green"><div className="stat-value">{stats.applied}</div><div className="stat-label">Applied</div></div>
        <div className="stat-card stat-red"><div className="stat-value">{stats.skipped}</div><div className="stat-label">Skipped</div></div>
        <div className="stat-card stat-orange"><div className="stat-value">{stats.already_applied}</div><div className="stat-label">Already Applied</div></div>
        <div className="stat-card"><div className="stat-value">{stats.evaluated}</div><div className="stat-label">Evaluated</div></div>
        <div className="stat-card stat-blue stat-wide"><div className="stat-value-sm">{stats.current_query || 'Idle'}</div><div className="stat-label">Current Query</div></div>
      </div>

      <section className="section">
        <h2>Jobs {jobs.length > 0 && <span className="count">({jobs.length})</span>}</h2>
        <div className="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Company</th><th>Job Title</th><th>Location</th><th>Salary</th><th>Experience</th><th>Match</th><th>Status</th><th>AI Analysis</th></tr></thead>
            <tbody>
              {jobs.map((job) => (
                <tr key={job.id} className={getRowClass(job.status)}>
                  <td className="col-num">{job.id}</td>
                  <td className="col-company">{job.company}</td>
                  <td className="col-title">{job.url ? <a href={job.url} target="_blank" rel="noopener noreferrer" className="job-link">{job.title}</a> : job.title}</td>
                  <td>{job.location}</td>
                  <td>{job.salary}</td>
                  <td>{job.experience}</td>
                  <td><span className={`score-badge ${getScoreClass(job.match_score)}`}>{job.match_score != null ? `${job.match_score}%` : '...'}</span></td>
                  <td><span className={`status-badge ${getStatusClass(job.status)}`}>{job.status}</span></td>
                  <td className="col-reason">{job.match_reason}</td>
                </tr>
              ))}
            </tbody>
          </table>
          {jobs.length === 0 && <div className="empty">No jobs evaluated yet. Launch browser, login, and start the agent.</div>}
        </div>
      </section>

      <section className="section">
        <h2>Activity Log {logs.length > 0 && <span className="count">({logs.length})</span>}</h2>
        <div className="log-box" ref={logBoxRef}>
          {logs.map((log, i) => (
            <div key={i} className="log-line">
              <span className="log-time">[{log.time}]</span>
              <span className="log-msg">{log.message}</span>
            </div>
          ))}
        </div>
      </section>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<React.StrictMode><App /></React.StrictMode>);
  </script>
</body>
</html>
